<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Experimental game</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/colyseus.js/dist/colyseus.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>


    <style>

    
      body{
        margin: 0;
        overflow: hidden;
        background-color: #121212;
        height: 100vh;
        display: flex;
         justify-content: center;
      align-items: center;
      }

      /* Game canvas cursor styling for cross-browser compatibility */
      canvas {
        margin: 0;
        cursor: url('./assets/cursor.cur') 16 16, crosshair !important;
      }

      #overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  pointer-events: none; 
  z-index: 10;
}

    
  #loginForm {
  background-color: #1a1a1a;
  padding: 30px;
  border: 2px solid #99bb99;
  border-radius: 10px;
  width: 320px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  z-index: 1000;
  font-family: 'Silkscreen', sans-serif;
}


#loginForm h2 {
  color: #cceedd;
  font-size: 18px;
  text-align: center;
  margin: 0 0 10px;
}


#loginForm input {
  padding: 10px;
  background-color: #0f0f0f;
  color: #cceedd;
  border: 1px solid #99bb99;
  border-radius: 4px;
  font-size: 16px;
  outline: none;
}

#loginForm input:focus {
  border-color: #cceedd;
}


#loginForm button {
  padding: 10px;
  background-color: #99bb99;
  color: #0f0f0f;
  border: none;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  text-transform: uppercase;
  border-radius: 20px; 
  transition: background 0.2s ease;
  font-family: inherit;
  width: 70%;
  text-align: center;
}

#loginForm button:hover {
  background-color: #cceedd;
}

#loginForm button:last-child {
  background-color: transparent;
  color: #cceedd;
  border: 1px solid #99bb99;
}

#loginForm button:last-child:hover {
  background-color: #99bb99;
  color: #0f0f0f;
}

/* Team Selection Styles */
#teamSelectionForm {
  background-color: #1a1a1a;
  padding: 30px;
  border: 2px solid #99bb99;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  z-index: 1000;
  font-family: 'Silkscreen', sans-serif;
  max-width: 600px;
}

#teamSelectionForm h2 {
  color: #cceedd;
  font-size: 20px;
  text-align: center;
  margin: 0 0 20px;
}

.team-options {
  display: flex;
  gap: 40px;
  justify-content: center;
}

.team-option {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
  padding: 20px;
  border: 2px solid #444444;
  border-radius: 10px;
  background-color: #2a2a2a;
  transition: all 0.3s ease;
  cursor: pointer;
}

.team-option:hover {
  border-color: #99bb99;
  background-color: #333333;
  transform: translateY(-5px);
}

.team-image {
  width: 80px;
  height: 80px;
  object-fit: contain;
  image-rendering: pixelated;
}

.team-option h3 {
  color: #cceedd;
  font-size: 14px;
  margin: 0;
}

.team-btn {
  padding: 10px 20px;
  background-color: #99bb99;
  color: #0f0f0f;
  border: none;
  font-size: 12px;
  font-weight: bold;
  cursor: pointer;
  text-transform: uppercase;
  border-radius: 20px; 
  transition: background 0.2s ease;
  font-family: inherit;
}

.team-btn:hover {
  background-color: #cceedd;
}

#overlay {
  position: absolute;
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  pointer-events: auto; 
  z-index: 10;
}


      </style>
  </head>
  <body>

    <section id="game-container"></section>

    <div id="overlay">

    <!-- Login Form -->
    <div id="loginForm">
      <h2>Login</h2>
      <button id="googleLoginBtn">Login with Google</button>
      <button class="guestBtn" type="button"> Login as guest </button>
    </div>
<!-- Team Selection Menu -->
<div id="teamSelectionForm" style="display: none;">
  <h2>Choose Your Team</h2>
  <div class="team-options">
    <div class="team-option" id="orangeTeam">
      <img src="assets/Empty_hands.png" alt="Orange Team" class="team-image">
      <h3>Orange Team</h3>
      <button class="team-btn" data-team="orange">Select Orange</button>
    </div>
    <div class="team-option" id="blueTeam">
      <img src="assets/Blue_Empty_hands.png" alt="Blue Team" class="team-image">
      <h3>Blue Team</h3>
      <button class="team-btn" data-team="blue">Select Blue</button>
    </div>
  </div>
</div>

    </div>
    <!--<script src="bundle.min.js"></script>-->

<script type="text/javascript" src="main.279807ec89f142458e0d.js"></script></body>




    
</html>
